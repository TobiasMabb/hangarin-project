<header class="topbar">
    <div>
        <h2 class="topbar-title">Hangarin</h2>
        <p class="topbar-subtitle">Task &amp; To-Do Manager</p>
    </div>

    <div class="topbar-right">
        {% if request.user.is_authenticated %}
            <span class="topbar-badge">{{ request.user.username }}</span>
            <form method="post" action="{% url 'logout' %}" class="logout-form">
                {% csrf_token %}
                <button type="submit" class="btn-danger btn-small">Logout</button>
            </form>
        {% endif %}
    </div>
</header>
