{% extends 'base.html' %}

{% block content %}
<div class="page-header">
    <h1>Delete Task</h1>
</div>

<div class="panel-card">
    <p>Are you sure you want to delete <strong>{{ task.title }}</strong>?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn-danger">Delete</button>
    </form>
</div>
{% endblock %}
