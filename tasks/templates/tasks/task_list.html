{% extends 'base.html' %}

{% block content %}
<div class="page-header">
    <h1>Tasks</h1>
    <a href="{% url 'task_create' %}" class="btn-primary">+ Add Task</a>
</div>

<div class="panel-card">
    <table class="custom-table">
        <thead>
            <tr>
                <th>Title</th>
                <th>Status</th>
                <th>Priority</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for task in tasks %}
            <tr>
                <td><a href="{% url 'task_detail' task.pk %}">{{ task.title }}</a></td>
                <td>{{ task.status }}</td>
                <td>{{ task.priority }}</td>
                <td>
                    <a href="{% url 'task_update' task.pk %}">Edit</a> |
                    <a href="{% url 'task_delete' task.pk %}">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
